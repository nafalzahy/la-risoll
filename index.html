<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La.Risoll</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="animatedBackground"></canvas>
    
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1><i></i> La.Risoll</h1>
                <p>Cita rasa kelezatan dalam setiap gigitan</p>
            </div>
        </header>

        <div class="main-content">
            <div class="menu-section">
                <div id="menuList" class="menu-list">
                    <!-- Menu items will be loaded here -->
                </div>
            </div>

            <div class="cart-section">
                <div class="cart">
                    <div class="cart-header">
                        <h2><i class="fas fa-shopping-cart"></i> Keranjang</h2>
                        <button id="clearCart" class="clear-cart-btn">
                            <i class="fas fa-trash"></i> Kosongkan
                        </button>
                    </div>
                    
                    <div id="cartItems" class="cart-items">
                        <div class="empty-cart">
                            <i class="fas fa-shopping-cart"></i>
                            <p>Keranjang kosong</p>
                        </div>
                    </div>
                    
                    <div class="cart-footer">
                        <div class="cart-total">
                            <span>Total:</span>
                            <span id="totalAmount">Rp 0</span>
                        </div>
                        <button id="whatsappBtn" class="whatsapp-btn">
                            <i class="fab fa-whatsapp"></i> Pesan via WhatsApp
                        </button>
                        <button id="processPayment" class="payment-btn">
                            <i class="fas fa-credit-card"></i> Simpan Pesanan
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <footer>
            <p>La.Risoll &copy; 2025 - Jl. Raya kediri, Cerme, Pace, Nganjuk, Jatim</p>
            <p>Reservasi: 0813-3087-8436</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
